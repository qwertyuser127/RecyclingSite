<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gallery — Smart Recycling</title>
<link rel="icon" type="image/svg+xml" href="icons/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<main id="main">

<div class="page-head">
  <h1 style="font-size:clamp(2rem,5vw,3rem);">Smart Recycling Gallery</h1>
  <p>A look at what good sorting looks like around school.</p>
</div>

<section id="gallery">
  <div class="gallery">
    <figure>
      <img src="images/gallery-1.svg" alt="Illustration of students correctly sorting bottles and boxes into labelled bins">
      <figcaption>Students correctly sorting bottles into recycling bins.</figcaption>
    </figure>
    <figure>
      <img src="images/gallery-2.svg" alt="Illustration of a row of four colour-coded bins">
      <figcaption>Color-coded bins placed around the school.</figcaption>
    </figure>
    <figure>
      <img src="images/gallery-3.svg" alt="Illustration of a clean recycling station with clear signage">
      <figcaption>A clean recycling station with clear signage.</figcaption>
    </figure>
    <figure>
      <img src="images/gallery-4.svg" alt="Illustration of a recycling symbol representing the eco-friendly waste area">
      <figcaption>Eco-friendly waste area encouraging proper sorting.</figcaption>
    </figure>
  </div>
  <p style="margin-top:24px;font-size:.85rem;opacity:.7;max-width:640px;">
    Note: these are simple illustrations standing in for real photos. Drop actual photos into the
    <code>images/</code> folder and update the <code>src</code> attributes above to replace them.
  </p>
</section>

</main>

<script src="js/common.js"></script>
</body>
</html>
